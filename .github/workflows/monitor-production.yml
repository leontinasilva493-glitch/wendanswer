name: Monitor Production

on:
  schedule:
    - cron: "2,17,32,47 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: monitor-production
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run monitor:production
        env:
          MONITOR_BASE_URL: ${{ vars.MONITOR_BASE_URL || 'https://wendanswertoday.org' }}
          OPS_ALERT_WEBHOOK_URL: ${{ secrets.OPS_ALERT_WEBHOOK_URL }}
          WEND_ALERT_WEBHOOK_URL: ${{ secrets.WEND_ALERT_WEBHOOK_URL }}
          OPS_ALERT_TELEGRAM_BOT_TOKEN: ${{ secrets.OPS_ALERT_TELEGRAM_BOT_TOKEN }}
          OPS_ALERT_TELEGRAM_CHAT_ID: ${{ secrets.OPS_ALERT_TELEGRAM_CHAT_ID }}
      - name: Open monitoring failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            const title = `Production monitor failed - ${date}`;
            const { owner, repo } = context.repo;
            for (const label of [
              { name: "automation", color: "0A66C2", description: "Automated workflow follow-up" },
              { name: "monitoring", color: "B91C1C", description: "Production monitoring alert" },
              { name: "p0", color: "DC2626", description: "Launch-blocking priority" },
            ]) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({ owner, repo, ...label });
                } else {
                  throw error;
                }
              }
            }
            const existing = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              labels: "automation,monitoring",
            });
            if (!existing.data.some((issue) => issue.title === title)) {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                labels: ["automation", "monitoring", "p0"],
                body: [
                  "The production monitor failed.",
                  "",
                  `Run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
                  "",
                  "Check uptime, noindex headers/meta, sitemap/robots, Today page freshness, and the legacy archive 308 redirect.",
                ].join("\n"),
              });
            }
      - name: Close recovered monitoring issues
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const openIssues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              labels: "automation,monitoring",
            });
            for (const issue of openIssues.data) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: `Recovered in ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}. Freshness and production checks passed.`,
              });
              await github.rest.issues.update({ owner, repo, issue_number: issue.number, state: "closed" });
            }
