name: Publish Wend Daily

on:
  schedule:
    - cron: "0,1,3,5,7,9,12,15,20,30,45 8 * * *"
    - cron: "5,20,35,50 9 * * *"
  workflow_dispatch:
    inputs:
      expected_date:
        description: "Expected Wend date, YYYY-MM-DD. Leave blank for current UTC date."
        required: false
        type: string
      source_url:
        description: "Optional one-off source URL. Leave blank to use configured sources."
        required: false
        type: string
  repository_dispatch:
    types: [publish-wend-daily]

permissions:
  contents: write
  issues: write

concurrency:
  group: publish-wend-daily
  cancel-in-progress: false

jobs:
  publish-wend:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run publish:wend
        env:
          WEND_DAILY_SOURCE_URL: ${{ github.event.inputs.source_url || github.event.client_payload.source_url || secrets.WEND_DAILY_SOURCE_URL }}
          WEND_DAILY_FALLBACK_SOURCE_URL: ${{ vars.WEND_DAILY_FALLBACK_SOURCE_URL }}
          WEND_DEPLOY_COMMAND: ${{ secrets.WEND_DEPLOY_COMMAND }}
          WEND_ALERT_WEBHOOK_URL: ${{ secrets.WEND_ALERT_WEBHOOK_URL }}
          OPS_ALERT_WEBHOOK_URL: ${{ secrets.OPS_ALERT_WEBHOOK_URL }}
          OPS_ALERT_TELEGRAM_BOT_TOKEN: ${{ secrets.OPS_ALERT_TELEGRAM_BOT_TOKEN }}
          OPS_ALERT_TELEGRAM_CHAT_ID: ${{ secrets.OPS_ALERT_TELEGRAM_CHAT_ID }}
          WEND_PERSIST_TO_GIT: "true"
          WEND_EXPECTED_DATE: ${{ github.event.inputs.expected_date || github.event.client_payload.expected_date }}
      - name: Open failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            const title = `Wend daily publish failed - ${date}`;
            const { owner, repo } = context.repo;
            for (const label of [
              { name: "automation", color: "0A66C2", description: "Automated workflow follow-up" },
              { name: "wend-publish", color: "D97706", description: "Wend daily publish automation" },
            ]) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({ owner, repo, ...label });
                } else {
                  throw error;
                }
              }
            }
            const existing = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              labels: "automation,wend-publish",
            });
            if (!existing.data.some((issue) => issue.title === title)) {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                labels: ["automation", "wend-publish"],
                body: [
                  "The scheduled Wend publish workflow failed.",
                  "",
                  `Run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
                  "",
                  "Check whether the source URL still exposes JSON or data-row/data-col HTML cells, then rerun the workflow manually.",
                ].join("\n"),
              });
            }
      - name: Smoke production
        run: |
          if [ -n "$WEND_PUBLIC_BASE_URL" ]; then
            SMOKE_BASE_URL="$WEND_PUBLIC_BASE_URL" npm run smoke:local
          else
            echo "WEND_PUBLIC_BASE_URL is not configured; skipping production smoke."
          fi
        env:
          WEND_PUBLIC_BASE_URL: ${{ secrets.WEND_PUBLIC_BASE_URL }}
      - name: Submit IndexNow
        run: npm run indexnow:submit
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          INDEXNOW_SITE_URL: ${{ vars.INDEXNOW_SITE_URL || 'https://wendanswertoday.org' }}
          INDEXNOW_ENDPOINT: ${{ vars.INDEXNOW_ENDPOINT }}
